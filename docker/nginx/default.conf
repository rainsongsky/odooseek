## Oweb 反向代理网关（Nginx）
##
## 目标：
## - `/`：返回 `apps/oweb/dist` 的静态资源（React/Vite 构建产物）
## - `/api/odoo/*`：同源代理到 Odoo（容器内 `web:8069`），并移除 `/api/odoo` 前缀
##
## 设计约束：
## - 前端以单页应用（SPA）方式工作，非文件路径需 fallback 到 `/index.html`
## - 需要支持 Odoo 19 bus WebSocket：`/websocket`（前端实际访问 `/api/odoo/websocket`）

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;

  # ----------------------------
  # 1) Oweb 静态站点（Vite build）
  # ----------------------------
  root /usr/share/nginx/html;
  index index.html;

  # Vite 构建的 hashed 资源可长期缓存
  location ^~ /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # 其它静态文件（favicon、images 等）
  location ~* \.(?:ico|png|jpg|jpeg|svg|webp|gif|css|js|map|woff2?|ttf)$ {
    try_files $uri =404;
  }

  # ----------------------------
  # 2) Odoo API 同源代理
  # ----------------------------
  location ^~ /api/odoo/ {
    client_max_body_size 50m;
    proxy_http_version 1.1;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 60s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket 支持（/api/odoo/websocket）
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # 本地开发/HTTP 部署兼容：避免 `Secure` Cookie 在 HTTP 下被浏览器拒收
    # - 如果你使用 HTTPS，可删除该行
    proxy_cookie_flags session_id nosecure samesite=lax;

    # 移除前缀，保持与 Odoo 原始路由一致
    rewrite ^/api/odoo/(.*)$ /$1 break;
    proxy_pass http://web:8069;
  }

  # ----------------------------
  # 3) SPA 路由 fallback
  # ----------------------------
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store";
  }
}


