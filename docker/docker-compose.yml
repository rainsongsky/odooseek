services:
  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      # 统一入口：访问 http://localhost:8080 进入 apps/oweb（同源代理 /api/odoo 到 Odoo）
      - "8080:80"
    volumes:
      # Nginx 配置（同源代理 + SPA fallback）
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Oweb 静态资源（Vite build 产物）
      - ../apps/oweb/dist:/usr/share/nginx/html:ro

  web:
    image: odoo:19.0
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
    environment:
      - HOST=db
      - PORT=5432
      - USER=odoo
      - PASSWORD=odoo
      # Odoo 19 CORS 环境变量（可选，使用原生配置）
      # 不再需要自定义 CORS 配置，使用 Odoo 19 原生 CORS 配置
      # Odoo 19 原生配置已包含标准 CORS 头部
      # 注意：不再需要 X-Openerp-Session-Id 请求头，依赖浏览器自动发送 Cookie
    command: >
      sh -c "pip3 install --break-system-packages --quiet PyJWT==2.8.0 && odoo"
  db:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - odoo-db-data:/var/lib/postgresql/data/pgdata

  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
      # 可选：配置服务器自动发现
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    ports:
      - "25050:80"
    depends_on:
      - db
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    restart: unless-stopped

volumes:
  odoo-web-data:
  odoo-db-data:
  pgadmin-data:
