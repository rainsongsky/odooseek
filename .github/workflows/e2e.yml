name: E2E

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Frontend base URL (Vite :5173 or BFF :3000)'
        required: false
        default: 'http://localhost:5173'

jobs:
  playwright:
    name: Playwright (MVAM)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/oweb
    env:
      E2E_BASE_URL: ${{ inputs.base_url }}
      E2E_SKIP_WEBSERVER: '1'
      E2E_DB: ${{ secrets.E2E_DB }}
      E2E_LOGIN: ${{ secrets.E2E_LOGIN }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bun run e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/oweb/playwright-report/
          retention-days: 7
