name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Backend: stable ─────────────────────────────
  backend-stable:
    name: Rust (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Lint with clippy
        run: cargo clippy --all-targets --no-deps

      - name: Build
        run: cargo build --workspace

      - name: Document (rustdoc)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps

      - name: Test
        run: cargo test --workspace -- --test-threads=1

  # ── Backend: beta + nightly (informational) ────
  backend-other:
    name: Rust (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        toolchain: [beta, nightly]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.toolchain }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace -- --test-threads=1

  # ── Latest dependencies check ───────────────────
  latest-deps:
    name: Latest dependencies
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: allow
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Update to latest deps
        run: cargo update --verbose

      - name: Build with latest deps
        run: cargo build --workspace

      - name: Test with latest deps
        run: cargo test --workspace -- --test-threads=1

  # ── Frontend ────────────────────────────────────
  frontend:
    name: Frontend (oweb)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/oweb
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check + Build
        run: bun run build

      - name: Lint
        run: bun run lint
